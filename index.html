<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WealthScope — Quiz</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =========== AUSWAHLSEITE =========== -->
  <div class="screen active" id="homeScreen">
    <header class="top-bar">
      <div class="brand">Wealth<span>Scope</span></div>
      <a href="https://portfolio-app-e2144.web.app" target="_blank" rel="noopener" class="app-btn">
        <span class="app-btn-icon">📊</span>
        <span class="app-btn-text">Meine App</span>
      </a>
    </header>

    <main class="home-main">
      <div class="home-intro">
        <h1>Wähle dein <span class="gradient-text">Quiz</span></h1>
        <p>Teste dein Weltwissen — vier Themen, eine Karte, viele Fragen.</p>
      </div>

      <div class="quiz-grid">
        <button class="quiz-card" data-quiz="laender">
          <div class="card-glow"></div>
          <div class="card-icon">🌍</div>
          <h2>Länderquiz</h2>
          <p>Erkenne Länder und ihre Hauptstädte</p>
          <div class="card-arrow">→</div>
        </button>

        <button class="quiz-card" data-quiz="flaggen">
          <div class="card-glow"></div>
          <div class="card-icon">🚩</div>
          <h2>Flaggenquiz</h2>
          <p>Welche Flagge gehört zu welchem Land?</p>
          <div class="card-arrow">→</div>
        </button>

        <button class="quiz-card" data-quiz="staedte">
          <div class="card-glow"></div>
          <div class="card-icon">🏙️</div>
          <h2>Städtequiz</h2>
          <p>Wo liegen die größten Städte der Welt?</p>
          <div class="card-arrow">→</div>
        </button>

        <button class="quiz-card" data-quiz="wasser">
          <div class="card-glow"></div>
          <div class="card-icon">💧</div>
          <h2>Wasserquiz</h2>
          <p>Meere, Flüsse und Seen der Erde</p>
          <div class="card-arrow">→</div>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 WealthScope</p>
    </footer>
  </div>

  <!-- =========== QUIZ-SCREEN (für alle Quizze) =========== -->
  <div class="screen" id="quizScreen">
    <header class="top-bar">
      <button class="back-btn" onclick="goHome()">
        <span>←</span> Zurück
      </button>
      <div class="brand quiz-brand" id="quizTitle">Quiz</div>
      <a href="https://portfolio-app-e2144.web.app" target="_blank" rel="noopener" class="app-btn">
        <span class="app-btn-icon">📊</span>
        <span class="app-btn-text">Meine App</span>
      </a>
    </header>

    <main class="quiz-main">
      <div class="map-wrapper">
        <div id="map"></div>
        <div class="map-overlay" id="mapOverlay">
          <div class="overlay-content">
            <div class="overlay-icon" id="overlayIcon">🌍</div>
            <h2 id="overlayTitle">Bereit?</h2>
            <p id="overlayText">Klicke auf "Quiz starten" um loszulegen.</p>
            <button class="start-btn" onclick="startQuiz()">Quiz starten</button>
          </div>
        </div>
      </div>

      <div class="quiz-panel" id="quizPanel" style="display:none;">
        <p class="placeholder-text">Quiz-Inhalt folgt in Kürze…</p>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
