name = "wealthscope-yahoo"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Stündlicher, pünktlicher Cron (Cloudflare führt das zuverlässig aus, anders als
# GitHub Actions). Holt jede Stunde frische Yahoo-Kurse und committet sie ins Repo.
[triggers]
crons = ["0 * * * *"]

[vars]
REPO = "danielgerner06-bit/wealthscope"
BRANCH = "main"
MIN_GAP_MIN = "50"
# Cloudflare Free = HART 50 fetch-Subrequests/Lauf (alle zählen: getFile, crumb, commit).
# SUBREQ_CAP=33 -> 23 Sektor/Region (immer) + ~10 rollierende Aktien-Fetches + ~8 Overhead
# = ~41, sicher unter 50. Worker läuft STÜNDLICH (24×/Tag) -> Tagesdurchsatz trotzdem hoch.
SUBREQ_CAP = "33"
PERF6M_BUDGET = "4"
PRE1M_BUDGET = "3"
ENRICH_BUDGET = "4"
SNAPSHOT_BUDGET = "3"
MILESTONE_BUDGET = "3"

# Secrets (NICHT hier eintragen, via `wrangler secret put` setzen):
#   GITHUB_TOKEN  – Fine-grained PAT, "Contents: Read and write" auf das Repo
#   RUN_KEY       – frei wählbares Passwort für den manuellen /run-Test
