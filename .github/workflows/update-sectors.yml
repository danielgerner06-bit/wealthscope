name: Sektordaten aktualisieren

on:
  schedule:
    # Yahoo-Kurse macht jetzt der Cloudflare-Worker STÜNDLICH (pünktlich). Diese Action
    # ist nur noch für Gemini (News/Discovery/Lage) + Finnhub-Scan zuständig — die laufen
    # ohnehin nur alle ~6h (heavyAt-Gating). Daher 4 Slots/Tag; GitHubs Cron-Jitter
    # (1-2h Verspätung) ist beim 6h-Takt unkritisch. Mehrere Zeiten = höhere Trefferchance.
    - cron: '13 1,7,13,19 * * *'
    - cron: '43 2,8,14,20 * * *'
  workflow_dispatch:         # manueller Start möglich
    inputs:
      force_heavy:
        description: 'Vollen Lauf erzwingen (Gemini+Finnhub, ignoriert 6h-Takt)'
        type: boolean
        default: false
      debug:
        description: 'Gemini-Debug-Logging (rohe Antworten/Verwerfungsgründe)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sektordaten aktualisieren (Finnhub + Gemini)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # bei manuellem "force_heavy" das 6h-Gating überbrücken (HEAVY_GAP_H=0 -> immer voll)
          HEAVY_GAP_H: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_heavy) && '0' || '' }}
          GEMINI_DEBUG: ${{ (github.event_name == 'workflow_dispatch' && inputs.debug) && '1' || '' }}
        run: node scripts/update-sectors.mjs

      - name: Änderungen committen
        run: |
          if git diff --quiet sectordata.json history.json; then
            echo "Keine Änderungen."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sectordata.json history.json
            git commit -m "Sektordaten aktualisiert ($(date -u +%Y-%m-%d))"
            # bis zu 3 Versuche: bei parallelem Push (z. B. manueller Commit) erst rebasen
            for i in 1 2 3; do
              if git push; then break; fi
              echo "Push abgelehnt – rebase und erneut versuchen ($i)…"
              git pull --rebase -X ours origin main || git rebase --abort
            done
          fi
